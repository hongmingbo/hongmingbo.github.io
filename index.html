<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人简历 - Hmingbo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-decoration"></div>

  <div class="container">
    <!-- 左侧栏 -->
    <aside class="sidebar">
      <div class="avatar-wrap">
        <div class="avatar">
          <span class="avatar-placeholder">📷</span>
        </div>
      </div>

      <h1 class="name">Hmingbo</h1>
      <p class="tagline">初三学生 · 热爱学习</p>

      <div class="divider"></div>

      <div class="contact-section">
        <h3>联系方式</h3>
        <div class="contact-item">
          <span class="contact-icon">📧</span>
          <span>hongmingbo2011@qq.com</span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">📍</span>
          <span>福建省</span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">🎂</span>
          <span>2011年出生</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="skills-section">
        <h3>技能特长</h3>
        <div class="skill-item">
          <span class="skill-name">语文</span>
          <div class="skill-bar"><div class="skill-fill" style="width:85%"></div></div>
        </div>
        <div class="skill-item">
          <span class="skill-name">数学</span>
          <div class="skill-bar"><div class="skill-fill" style="width:90%"></div></div>
        </div>
        <div class="skill-item">
          <span class="skill-name">英语</span>
          <div class="skill-bar"><div class="skill-fill" style="width:80%"></div></div>
        </div>
        <div class="skill-item">
          <span class="skill-name">Python编程</span>
          <div class="skill-bar"><div class="skill-fill" style="width:65%"></div></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="hobby-section">
        <h3>兴趣爱好</h3>
        <div class="hobby-tags">
          <span class="hobby-tag">📚 阅读</span>
          <span class="hobby-tag">💻 编程</span>
          <span class="hobby-tag">🎵 音乐</span>
          <span class="hobby-tag">⚽ 运动</span>
        </div>
      </div>
    </aside>

    <!-- 右侧内容 -->
    <main class="main-content">
      <!-- 关于我 -->
      <section class="section-card fade-in">
        <div class="section-header">
          <span class="section-num">01</span>
          <h2>关于我</h2>
        </div>
        <p>无</p>
      </section>

      <!-- 获奖经历 -->
      <section class="section-card fade-in">
        <div class="section-header">
          <span class="section-num">02</span>
          <h2>获奖经历</h2>
        </div>
        <div class="timeline">
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
              <span class="timeline-year">2024</span>
              <h4></h4>
              <p></p>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
              <span class="timeline-year">2024</span>
              <h4></h4>
              <p></p>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
              <span class="timeline-year">2023</span>
              <h4></h4>
              <p></p>
            </div>
          </div>
        </div>
      </section>

      <!-- 学习经历 -->
      <section class="section-card fade-in">
        <div class="section-header">
          <span class="section-num">03</span>
          <h2>学习经历</h2>
        </div>
        <div class="experience-grid">
          <div class="exp-card">
            <span class="exp-period">2022 - 2025</span>
            <h4></h4>
            <p></p>
          </div>
        </div>
      </section>

      <!-- 自我评价 -->
      <section class="section-card fade-in">
        <div class="section-header">
          <span class="section-num">04</span>
          <h2>自我评价</h2>
        </div>
        <div class="quote-box">
          <p></p>
        </div>
      </section>
    </main>
  </div>

  <footer>
    <p>👋 感谢查看 · 最后更新于 2026年5月</p>
  </footer>
</body>
</html>
