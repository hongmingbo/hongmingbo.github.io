<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目展示 / 作品归档</title>
  <meta name="description" content="项目展示与研究归档，聚焦前端设计、自动化、知识管理、自托管与技术研究。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <div class="loader" id="loader">
    <div class="loader-content">
      <p class="loader-text"><span>正在加载</span><span id="loaderPercent">0%</span></p>
      <div class="loader-percent" id="loaderNum">0</div>
      <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
      <p class="loader-sub">Project Archive / 2026</p>
    </div>
  </div>

  <div class="scroll-progress" id="scrollProgress"></div>
  <div class="noise"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <header class="header" id="header">
    <a href="#hero" class="logo">Project<span>.</span>Archive</a>
    <nav class="top-nav">
      <a href="#work">项目</a>
      <a href="#research">研究</a>
      <a href="#contact" class="nav-cta">获取信息</a>
    </nav>
  </header>

  <div class="scroll-hint" id="scrollHint">
    <span>向下浏览</span>
    <div class="scroll-hint-line"></div>
  </div>

  <main id="app">
    <section class="section section-hero" id="hero">
      <div class="hero-content">
        <p class="hero-tagline">项目展示 · 研究归档 · 工具整理</p>
        <h1 class="hero-title">
          <span class="hero-line">把项目<span class="accent">整理</span>好，</span>
          <span class="hero-line">把能力<span class="accent">展示</span>清楚。</span>
        </h1>
        <p class="hero-copy">
          这里记录前端设计、自动化、知识管理、自托管和技术研究的成果，重点是清晰、可读、可持续维护。
        </p>
        <div class="hero-actions">
          <a href="#work" class="button button-primary">查看项目</a>
          <a href="#research" class="button button-secondary">查看研究</a>
        </div>
        <div class="hero-meta">
          <span class="hero-meta-item">static site</span>
          <span class="hero-meta-divider">/</span>
          <span class="hero-meta-item">visual archive</span>
          <span class="hero-meta-divider">/</span>
          <span class="hero-meta-item">2026</span>
        </div>
      </div>
    </section>

    <section class="section section-work" id="work">
      <div class="work-header">
        <h2 class="work-title reveal">项目</h2>
        <p class="work-subtitle reveal reveal-delay-1">记录已经做过的东西，保持可追踪、可复用、可继续迭代。</p>
      </div>
      <div class="project-grid" id="projectGrid"></div>
    </section>

    <section class="section section-research" id="research">
      <div class="work-header">
        <h2 class="work-title reveal">研究</h2>
        <p class="work-subtitle reveal reveal-delay-1">把阅读、方法论和工具链沉淀成可回看的知识条目。</p>
      </div>
      <div class="research-grid" id="researchGrid"></div>
    </section>
  </main>

  <div class="project-modal" id="projectModal" aria-hidden="true">
    <div class="project-modal-content">
      <button class="modal-close" id="closeProject" aria-label="关闭">×</button>
      <div id="projectModalBody"></div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
