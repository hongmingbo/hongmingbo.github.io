<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人简历</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>你的名字</h1>
      <p class="subtitle">中学生 / 热爱学习</p>
      <div class="contact">
        <span>📧 example@email.com</span>
        <span>📍 所在城市</span>
      </div>
    </header>
    <section>
      <h2>关于我</h2>
      <p>简单介绍一下自己，比如：我是一名初三学生，热爱数学和编程，喜欢探索新知识，学习能力强，有良好的团队协作精神。</p>
    </section>
    <section>
      <h2>技能特长</h2>
      <ul class="skills">
        <li>语文 / 数学 / 英语</li>
        <li>基础编程（Python）</li>
        <li>视频剪辑 / 图片处理</li>
      </ul>
    </section>
    <section>
      <h2>获奖经历</h2>
      <ul>
        <li>20XX年 XX竞赛 X等奖</li>
        <li>20XX年 校三好学生</li>
      </ul>
    </section>
    <section>
      <h2>兴趣爱好</h2>
      <p>阅读、编程、音乐、运动等</p>
    </section>
  </div>
</body>
</html>
